kind = "web"
previewPath = "/"
title = "EventSphere"
version = "1.0.0"
id = "artifacts/eventsphere"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19723

[services.development]
run = "pnpm --filter @workspace/eventsphere run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/eventsphere", "run", "build" ]
publicDir = "artifacts/eventsphere/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19723"
BASE_PATH = "/"
